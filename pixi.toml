[workspace]
name = "pmpp"
version = "0.1.0"
description = "Programming Massively Parallel Programs book notes"
authors = ["igodlab"]
channels = [
    "https://conda.modular.com/max-nightly/",
    "nvidia",
    "conda-forge",
]
platforms = ["linux-64"]

# Tell pixi the host system has a CUDA-capable driver (your RTX 4070)
# This must match your driver's supported CUDA version (yours supports 13.1)
[system-requirements]
cuda = "13.1"

# Core dependencies
[dependencies]
modular = "*"
jupyterlab = ">=4.4.10, <5.0"
python = ">=3.12, <4.0"
numpy = ">=2.3, <3.0"
pandas = ">=2.3.3, <3.0"
plotly = ">=6.3.1, <7.0"

# CUDA toolkit - pins the version and pulls in nvcc
cuda-version = "13.1.*"   # metapackage that pins the CUDA version for the solver
cuda-nvcc = "13.1.*"      # the actual nvcc compiler

# CUDA libraries needed for cudart linking
cuda-cudart = "13.1.*"
cuda-cudart-dev = "13.1.*"

# OpenCV (conda-forge build, includes dev headers)
libopencv = ">=4.10"
opencv = ">=4.10"

# C++ compiler & build tools
cxx-compiler = "*"
cmake = ">=3.28"
make = "*"

[pypi-dependencies]
catppuccin-jupyterlab = ">=0.2.4, <0.3"

# Useful tasks
[tasks]
jupyter_lab = "jupyter lab"
mojo = "mojo"
modular = "modular"

# Check Mojo installation
[tasks.check]
cmd = "mojo --version && modular --version"

# Start Jupyter with Mojo kernel (if available)
[tasks.notebook]
cmd = "jupyter lab --allow-root"


# >>> Tasks per chapter >>>
[tasks.build_ch02]
cmd = """
cmake -S src/ch02/cuda-notes -B src/ch02/cuda-notes/build \
      -DCMAKE_BUILD_TYPE=Release \
&& cmake --build src/ch02/cuda-notes/build --parallel
"""

[tasks.vector_addition]
cmd = "src/ch02/cuda-notes/build/vector_addition"
depends-on = ["build_ch02"]

[tasks.color_to_grey]
cmd = "src/ch02/cuda-notes/build/color_to_grey"
depends-on = ["build_ch02"]# <<< Tasks per chapter <<<
